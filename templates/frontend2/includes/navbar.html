<!-- ==========================================
NAVIGATION
=========================================== -->
{% load static %}
<header class="pmx-header">

    <nav id="pmxNavbar" class="pmx-navbar">

        <div class="container">

            <div class="pmx-navbar__wrapper">

                <!-- Logo -->

                <a href="{% url 'frontend:home' %}" class="pmx-navbar__logo">

                    <img
                        src="{% static 'frontend2/images/logos/pmx-logo.png' %}"
                        alt="PMX Precious Metals">

                </a>

                <!-- Desktop Menu -->

                <ul class="pmx-navbar__menu">

                    <li>
                        <a href="{% url 'frontend:home' %}"
                           class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                            Home
                        </a>
                    </li>

                    <li>
                        <a href="#">About</a>
                    </li>

                    <li>
                        <a href="#">Products</a>
                    </li>

                    <li>
                        <a href="#">Services</a>
                    </li>

                    <li>
                        <a href="#">Market Insights</a>
                    </li>

                    <li>
                        <a href="#">Contact</a>
                    </li>

                </ul>

                <!-- CTA -->

                <div class="pmx-navbar__actions">

                    <a href="#" class="pmx-btn pmx-btn--primary">

                        Request Quote

                        <i class="bi bi-arrow-right"></i>

                    </a>

                </div>

                <!-- Mobile Button -->

                <button

                    class="pmx-navbar__toggle"

                    data-bs-toggle="offcanvas"

                    data-bs-target="#mobileMenu">

                    <i class="bi bi-list"></i>

                </button>

            </div>

        </div>

    </nav>

</header>



<!-- ==========================================
OFFCANVAS
=========================================== -->

<div class="offcanvas offcanvas-end"

     tabindex="-1"

     id="mobileMenu">

    <div class="offcanvas-header">

        <img

            src="{% static 'frontend2/images/logos/pmx-logo.png' %}"

            style="height:55px;">

        <button

            class="btn-close"

            data-bs-dismiss="offcanvas">

        </button>

    </div>

    <div class="offcanvas-body">

        <ul class="pmx-mobile-menu">

            <li><a href="#">Home</a></li>

            <li><a href="#">About</a></li>

            <li><a href="#">Products</a></li>

            <li><a href="#">Services</a></li>

            <li><a href="#">Market Insights</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

        <div class="mt-4">

            <a href="#" class="pmx-btn pmx-btn--primary w-100">

                Request Quote

            </a>

        </div>

    </div>

</div>
