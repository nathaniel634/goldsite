<!-- ==================================================
HERO
================================================== -->
{% load static %}

<section class="pmx-hero">

    <!-- Background Video -->
    <video
        class="pmx-hero__video"
        autoplay
        muted
        loop
        playsinline
        preload="metadata">

        <source src="{% static 'frontend2/images/videos/home-video-1.mp4' %}" type="video/mp4">

        Your browser does not support HTML5 video.
    </video>

    <!-- Dark Overlay -->
    <div class="pmx-hero__overlay"></div>

    <!-- Hero Content -->
    <div class="container">

        <div class="row min-vh-100 align-items-center">

            <div class="col-lg-7">

                <div class="pmx-hero__content">

                    <span class="pmx-hero__subtitle">

                        PMX PRECIOUS METALS

                    </span>

                    <h1 class="pmx-hero__title">

                        Trusted Precious Metals Trading &
                        Investment Solutions

                    </h1>

                    <p class="pmx-hero__text">

                        Delivering excellence in gold, silver and precious
                        metals with integrity, security and unmatched
                        industry expertise.

                    </p>

                    <div class="pmx-hero__buttons">

                        <a href="#" class="pmx-btn pmx-btn--primary">

                            Explore Products

                            <i class="bi bi-arrow-right"></i>

                        </a>

                        <a href="#" class="pmx-btn pmx-btn--outline">

                            Contact Us

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Scroll Indicator -->

    <div class="pmx-scroll">

        <span></span>

    </div>

</section>
